apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: compute-indicators-daily
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/max-retries: "3"
    spec:
      template:
        spec:
          serviceAccountName: cloud-run-sa@naive-usstock-live.iam.gserviceaccount.com
          timeoutSeconds: 1800
          containers:
            - image: us-central1-docker.pkg.dev/naive-usstock-live/us-stock-repo/publisher:latest
              resources:
                limits:
                  cpu: "1"
                  memory: 2Gi
              command: ["sh", "-c"]
              args:
                - uv run python scripts/compute_indicators.py --as-of $(date -u +%Y-%m-%d)
              env:
                - name: PYTHONUNBUFFERED
                  value: "1"
                - name: PYTHONPATH
                  value: "/app/src:/app"
                - name: GOOGLE_APPLICATION_CREDENTIALS
                  value: ""
                - name: GCP_PROJECT_ID
                  value: naive-usstock-live
                - name: POSTGRES_USER
                  value: postgres
                - name: POSTGRES_DB
                  value: usstock
                - name: POSTGRES_HOST
                  value: 127.0.0.1
                - name: POSTGRES_PORT
                  value: "5432"
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: db-password
                      key: latest
            - image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.4
              args:
                - "--port=5432"
                - "naive-usstock-live:us-central1:naive-usstock-db"
