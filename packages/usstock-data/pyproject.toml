[project]
name = "usstock-data"
version = "0.1.0"
description = "Data layer for the personal US stock research system."
requires-python = ">=3.12,<3.13"
dependencies = [
  "httpx==0.27.2",
  "loguru==0.7.2",
  "notion-client==2.2.1",
  "pandas==2.3.3",
  "psycopg[binary]==3.2.3",
  "pydantic-settings==2.6.1",
  "PyYAML==6.0.2",
  "SQLAlchemy==2.0.36",
  "tenacity==9.0.0",
  "yfinance>=0.2.40",
]

[project.scripts]
usstock-data = "usstock_data.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
pythonpath = ["src"]
