[project]
name = "usstock-reports"
version = "0.1.0"
description = "Report delivery layer for the personal US stock research system."
requires-python = ">=3.12,<3.13"
dependencies = [
  "httpx==0.27.2",
  "loguru==0.7.2",
  "notion-client==2.2.1",
  "pandas==2.3.3",
  "psycopg[binary]==3.2.3",
  "PyYAML==6.0.2",
]

[project.scripts]
usstock-reports = "usstock_reports.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
