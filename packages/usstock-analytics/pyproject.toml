[project]
name = "usstock-analytics"
version = "0.1.0"
description = "Analytics layer for the personal US stock research system."
requires-python = ">=3.12,<3.13"
dependencies = [
  "pandas==2.3.3",
  "psycopg[binary]==3.2.3",
  "PyYAML==6.0.2",
  "SQLAlchemy==2.0.36",
]

[project.scripts]
usstock-analytics = "usstock_analytics.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
