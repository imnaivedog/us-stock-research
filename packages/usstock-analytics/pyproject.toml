[project]
name = "usstock-analytics"
version = "0.1.0"
description = "Analytics layer for the personal US stock research system."
requires-python = ">=3.12,<3.13"
dependencies = [
  "loguru==0.7.2",
  "mcp>=1.0.0",
  "numpy>=2.0.0",
  "pandas==2.3.3",
  "psycopg[binary]==3.2.3",
  "python-dotenv==1.2.2",
  "PyYAML==6.0.2",
  "SQLAlchemy==2.0.36",
]

[project.scripts]
usstock-analytics = "usstock_analytics.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
pythonpath = ["src"]
