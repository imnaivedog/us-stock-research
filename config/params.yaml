# US Stock Research · 信号引擎参数 · v1
# 修改任何参数后 · pytest 必须全过

l1_regime:
  # S 档 4 硬门槛
  s_hard:
    h1_spy_dist_to_monthly_high_max_pct: 3.0
    h2_breadth_200ma_min_p5y: 85
    h3a_vix_max_p5y: 20
    h3b_vix_10d_avg_max_p5y: 30
    h4_event_window_days: 7
  # S 档 1 软动能(任 1 满足)
  s_soft_any:
    s1_breadth_50ma_min_pct: 70
    s2_nh_nl_min_ratio: 3.0
    s3_mcclellan_min: 50
  # 时间确认
  s_confirm_days: 3
  s_demote_days: 0
  # 防抖冷却(ADR-020)
  cooldown_a_to_s_days: 5
  cooldown_adjacent_days: 2
  cooldown_demote_s_days: 0
  # 跳档豁免
  jump_exempt_vix_single_day_pct: 30

l2_breadth:
  # 200MA 宽度三档(近 5 年)
  pct_above_200ma:
    healthy_min_p5y: 50
    weak_max_p5y: 20
  # 50MA 宽度极值(近 5 年)
  pct_above_50ma_extreme:
    yellow_p5y: 90
    red_p5y: 95
    bottom_yellow_p5y: 10
    bottom_red_p5y: 5
  # 50MA 钝化(近 2 年)
  pct_above_50ma_dull:
    window_years: 2
    threshold_p2y: 75
    consec_days: 40
  # NH/NL
  nh_nl:
    extreme_red: 5.0
    extreme_bottom: 0.2
  # McClellan
  mcclellan:
    extreme_red: 100
    extreme_bottom: -100
  # Zweig Breadth Thrust
  zweig:
    window_days: 10
    from_threshold: 40
    to_threshold: 61.5
  # 顶部背离(20 日窗口)
  top_divergence:
    window_days: 20
    breadth_lag_min_pct: 5
  # 持续确认窗
  persistence:
    observation_days: 1
    yellow_days: 2
    red_days: 3
    structural_days: 5
  # 总评分权重(0-100)
  score_weights:
    pct_above_200ma_p5y: 0.40
    pct_above_50ma_p5y: 0.30
    nh_nl_normalized: 0.15
    mcclellan_normalized: 0.15

events:
  # 哪些事件类型纳入 H4 事件窗
  blocking_types:
    - FOMC
    - CPI
    - NFP
    - ELECTION_PRESIDENTIAL
    - ELECTION_MIDTERM

l3_sectors:
  symbols:
    - XLK
    - XLF
    - XLV
    - XLY
    - XLP
    - XLI
    - XLE
    - XLU
    - XLRE
    - XLB
    - XLC
  score_weights:
    trend: 0.25
    rs: 0.25
    breadth: 0.20
    money_flow: 0.15
    volatility: 0.15
  relative:
    leading_top: 2
    strong_top: 4
    neutral_top: 7
    weak_top: 9
  absolute_floor:
    leading_min_p5y: 70
    strong_min_p5y: 50
    neutral_min_p5y: 30
  multipliers:
    LEADING: 1.10
    STRONG: 1.05
    NEUTRAL: 1.00
    WEAK: 0.95
    LAGGING: 0.90

l4_themes:
  basket_weights:
    core: 0.70
    diffusion: 0.30
    concept: 0.00
  state_machine:
    incubating_to_launching:
      core_rs_min_p5y: 70
      market_volume_share_min_pct: 5
      core_breakout_min_count: 3
    launching_to_accelerating:
      theme_rank_max: 3
      core_50ma_above_min_pct: 80
    accelerating_to_decaying:
      volume_red_consec_no_high_days: 3
      core_rs_below_p50_pct: 50
  volume_alert:
    yellow_pct_1y: 80
    yellow_volume_ratio: 2.0
    red_pct_1y: 95
    red_volume_ratio: 3.0
    min_theme_age_months: 6
    fallback_age_min_months: 6

l4_stocks:
  total_score_weights:
    technical: 0.60
    fundamental: 0.25
    theme_bonus: 0.15
  technical_weights:
    trend_strength: 0.30
    momentum: 0.25
    relative_strength: 0.25
    volume_trend: 0.20
  top_n: 5
  entry:
    breakout_high_window: 20
    breakout_volume_multiplier: 1.5
    pullback_to_ma50_tolerance_pct: 3
    pullback_to_ma20_tolerance_pct: 2
  fundamental_score_placeholder: 50
  theme_bonus_map:
    in_top3: 80
    in_top4_to_8: 50
    not_in_themes: 30

themes_score:
  min_members: 5
  weights:
    ret_5d: 0.20
    ret_20d: 0.50
    ret_60d: 0.30
